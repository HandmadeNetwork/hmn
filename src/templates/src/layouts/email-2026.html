<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /*
   * Only simple classes with no overlapping selector precedence may be used! This whole <style>
   * block will be obliterated and all the styles will be trivially inlined wherever the `class`
   * would appear. Therefore, keep it aggressively utility-style.
   */
  
  body {
    font-family: Inter,Helvetica,Arial,sans-serif;
    margin: 0;
    padding: 0;
  }

  hr {
    border: none;
    border-bottom: 1px solid #c1c1c1;
    margin-top: 16px;
    margin-bottom: 16px;
  }

  .c1 {
    color: #000;
  }
  .c2 {
    color: #1F1F1F;
  }
  .c3 {
    color: #3a3a3a;
  }

  .bg1 {
    background: #fafafa;
  }
  .bg2 {
    background: #f3f3f3;
  }
  .bg3 {
    background: #dbdbdb;
  }

  .ma2 {
    margin: 8px;
  }
  .ma3 {
    margin: 16px;
  }
  .ma4 {
    margin: 32px;
  }

  .mh2 {
    margin-left: 8px;
    margin-right: 8px;
  }
  .mh3 {
    margin-left: 16px;
    margin-right: 16px;
  }
  .mh4 {
    margin-left: 32px;
    margin-right: 32px;
  }

  .mv2 {
    margin-top: 8px;
    margin-bottom: 8px;
  }
  .mv3 {
    margin-top: 16px;
    margin-bottom: 16px;
  }
  .mv4 {
    margin-top: 32px;
    margin-bottom: 32px;
  }

  .pa2 {
    padding: 8px;
  }
  .pa3 {
    padding: 16px;
  }
  .pa4 {
    padding: 32px;
  }
  
  .ph2 {
    padding-left: 8px;
    padding-right: 8px;
  }
  .ph3 {
    padding-left: 16px;
    padding-right: 16px;
  }
  .ph4 {
    padding-left: 32px;
    padding-right: 32px;
  }

  .pv2 {
    padding-top: 8px;
    padding-bottom: 8px;
  }
  .pv3 {
    padding-top: 16px;
    padding-bottom: 16px;
  }
  .pv4 {
    padding-top: 32px;
    padding-bottom: 32px;
  }

  .ba {
    border: 1px solid #c1c1c1;
  }
  .bt {
    border-top: 1px solid #c1c1c1;
  }
  .bb {
    border-bottom: 1px solid #c1c1c1;
  }

  .f1 {
    font-size: 48px;
  }
  .f2 {
    font-size: 36px;
  }
  .f3 {
    font-size: 24px;
  }
  .f4 {
    font-size: 20px;
  }
  .f5 {
    font-size: 16px;
  }
  .f6 {
    font-size: 14px;
  }
  .f7 {
    font-size: 12px;
  }

  .b {
    font-weight: bold;
  }
</style>
</head>

<body class="bg2 f6" style="color:#000">

<table role="presentation" cellpadding="0" cellspacing="0" width="100%" class="bg2 ph3 pv4">
<tr>
<td align="center">

<!-- Main container -->
<table role="presentation" cellpadding="0" cellspacing="0" width="600" style="width:100%;max-width:600px" class="bg1 ba">

<!-- Header -->
<tr>
<td class="bg3 pa3 f3 b bb">
Handmade Network
</td>
</tr>

<!-- Content -->
<tr>
<td class="pa3" style="line-height:1.4">
{{ block "content" . }}{{ end }}
</td>
</tr>

<!-- Divider -->
<tr>
<td class="bt"></td>
</tr>

<!-- Footer -->
<tr>
<td class="pa3 f7" style="line-height:1.4">
{{ block "footer" . }}{{ end }}
</td>
</tr>

</table>

<table role="presentation" cellpadding="0" cellspacing="0" width="100%" class="ph3 pv3">
<tr>
<td align="center">
<span class="f7 c3">
Handmade Network / Handmade Software Foundation<br>
310 4th Ave S Suite 5010 PMB 94594, Minneapolis, MN 55415
</span>
</td>
</tr>
</table>

</td>
</tr>
</table>

</body>
</html>
